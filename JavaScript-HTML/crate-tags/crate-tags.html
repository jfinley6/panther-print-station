<!DOCTYPE html>
<html>
    <head>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" />
        <title>Crate Tags</title>
    </head>

    <body style="background-color: limegreen" class="display-none">
        <!-- Header -->
        <div style="display: flex; align-items: center; margin-top: 20px; margin-bottom: 20px">
            <img
                src="file:/H:\Service Department\Production Forms\Form Files/pm-logo-panther.svg"
                style="width: 400px"
            />
            <h2><em>Crate Tags</em></h2>
        </div>

        <!-- Form -->
        <form id="panther-form" onSubmit="printlabel(); return false;">
            <h4>MACHINE INFORMATION</h4>
            <hr />
            <div
                style="
                    display: grid;
                    grid-template-columns: repeat(6, 1fr);
                    grid-template-rows: repeat(5, auto);
                    grid-column-gap: 10px;
                    grid-row-gap: 10px;
                "
            >
                <div style="grid-area: 1 / 2 / 3 / 4">
                    <div class="form-group">
                        <label for="customer">Customer Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="customer"
                            aria-describedby="customerName"
                            placeholder="Enter Customer Name"
                            autocomplete="off"
                        />
                    </div>
                    <div class="form-group">
                        <label for="end_user">End User</label>
                        <input
                            type="text"
                            class="form-control"
                            id="end_user"
                            aria-describedby="endUser"
                            placeholder="Enter End User"
                            autocomplete="off"
                        />
                    </div>
                    <div class="form-group">
                        <label for="order">Order Number</label>
                        <input
                            type="text"
                            class="form-control"
                            id="order"
                            aria-describedby="orderNumber"
                            placeholder="Enter Order Number"
                            autocomplete="off"
                        />
                    </div>
                    <div class="form-group">
                        <label for="order">Serial Number(s)</label>
                        <input
                            type="text"
                            class="form-control"
                            id="serial-number"
                            aria-describedby="serialNumber"
                            placeholder="Enter Serial Number(s)"
                            autocomplete="off"
                        />
                    </div>
                </div>

                <div style="grid-area: 1 / 4 / 3 / 6">
                    <div class="form-group">
                        <label for="total_number">Number of Crates</label>
                        <input
                            type="text"
                            class="form-control"
                            id="total_number"
                            aria-describedby="totalNumber"
                            placeholder="Enter Number of Crates"
                            autocomplete="off"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="print_qty">Labels Per Crate</label>
                        <select class="form-select" name="label_qty" id="print_qty">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="system_hand">System Hand</label>
                        <select class="form-select" name="system_hand" id="system_hand">
                            <option value="RH/RH">RH/RH</option>
                            <option value="LH/LH">LH/LH</option>
                            <option value="LH/RH">RH/LH</option>
                            <option value="LH">LH</option>
                            <option value="RH">RH</option>
                            <option value="	">NA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="system_hand">Choose a Printer</label>
                        <select
                            class="form-select"
                            name="ip_addr"
                            id="ip_addr"
                            onchange="savePrinterOption(event); return false"
                        >
                            <option value="192.168.17.94">Shipping</option>
                            <option value="192.168.17.96">Crating</option>
                        </select>
                    </div>
                </div>

                <div style="grid-area: 3 / 1 / 5 / 7">
                    <h4>Options</h4>
                    <hr />
                    <div class="form-check">
                        <div>
                            <div class="form-group">
                                <label class="form-check-label" for="Uncrating_Instructions">
                                    Uncrating Instructions
                                </label>
                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    value=""
                                    data-option="false"
                                    id="Uncrating_Instructions"
                                />
                            </div>
                        </div>
                        <div>
                            <div class="form-group">
                                <label class="form-check-label" for="spare-parts"> Spare Parts </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="spare-parts"
                                    name="Spare Parts"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>

                            <div class="form-group">
                                <label class="form-check-label" for="spare-printer"> Spare Print Engine </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="spare-printer"
                                    name="Spare Printer"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-check-label" for="PA4-000027"> PA4-000027 </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="PA4-000027"
                                    name="PA4-000027"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-check-label" for="TX12-B"> TX12-B </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="TX12-B"
                                    name="TX12-B"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                        </div>

                        <div>
                            <div class="form-group">
                                <label class="form-check-label" for="TX4048-B"> TX4048-B </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="TX4048-B"
                                    name="TX4048-B"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-check-label" for="TX4048-SLS-B"> TX4048-SLS-B </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="TX4048-SLS-B"
                                    name="TX4048-SLS-B"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                            <div class="form-group">
                                <label class="form-check-label" for="TX60-B"> TX60-B </label>
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    id="TX60-B"
                                    name="TX60-B"
                                    min="0"
                                    autocomplete="off"
                                />
                            </div>
                        </div>

                        <div>
                            <div id="additional-option" class="form-group" style="margin-left: 25%">
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    data-text-option="true"
                                    id="additional-option-1-quantity"
                                    name="additional-option-1-quantity"
                                    min="0"
                                    autocomplete="off"
                                />
                                <input
                                    type="text"
                                    class="form-control"
                                    id="add-option1"
                                    placeholder="Additional Options"
                                    autocomplete="off"
                                    style="width: 50%"
                                />
                            </div>
                            <div id="additional-option2" class="form-group" style="margin-left: 25%">
                                <input
                                    class="form-check-input form-check-number"
                                    type="number"
                                    value="0"
                                    data-option="true"
                                    data-text-option="true"
                                    id="additional-option-2-quantity"
                                    name="additional-option-2-quantity"
                                    min="0"
                                    autocomplete="off"
                                />
                                <input
                                    type="text"
                                    class="form-control"
                                    id="add-option2"
                                    placeholder="Additional Options"
                                    autocomplete="off"
                                    style="width: 50%"
                                />
                            </div>
                        </div>
                        <div style="position: absolute; bottom: 0; right: 0; left: 0; text-align: center">
                            <button type="submit" class="btn btn-primary">Print</button>
                            <button type="button" class="btn btn-primary" onclick="resetForm(); return false;">
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </body>
</html>
