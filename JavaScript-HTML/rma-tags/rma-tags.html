    <body style="background-color: limegreen">
        <!-- Header -->
        <div style="display: flex; align-items: center; margin-top: 20px">
            <img
                src="file:/H:\Service Department\Production Forms\Form Files/pm-logo-panther.svg"
                style="width: 300px"
            />
            <h2><em>RMA Tags</em></h2>
        </div>

        <!-- Form -->
        <form id="panther-form" onsubmit="printlabel(); return false">
            <h4>ITEM INFORMATION</h4>
            <hr />
            <div
                style="
                    display: grid;
                    grid-template-columns: repeat(6, 1fr);
                    grid-template-rows: repeat(8, auto);
                    grid-column-gap: 10px;
                    grid-row-gap: 10px;
                "
            >
                <div style="grid-area: 1 / 2 / 3 / 4">
                    <div class="form-group">
                        <label for="PartNumber">Part Number</label>
                        <input
                            type="text"
                            class="form-control"
                            id="PartNumber"
                            aria-describedby="partNumber"
                            placeholder="Enter Part Number"
                            autocomplete="off"
                        />
                    </div>
                </div>
                <div style="grid-area: 1 / 4 / 3 / 6">
                    <div class="form-group">
                        <label for="SerialNumber">Serial Number (If Applicable)</label>
                        <input
                            type="serialNumber"
                            class="form-control"
                            id="SerialNumber"
                            placeholder="Enter Serial Number"
                        />
                    </div>
                </div>
                <div style="grid-area: 3 / 1 / 4 / 7">
                    <h4>RMA INFORMATION</h4>
                    <hr />
                </div>
                <div style="grid-area: 4 / 2 / 5 / 4">
                    <div class="form-group">
                        <label for="ReportedIssue">Reported Issue</label>
                        <textarea
                            class="form-control"
                            id="ReportedIssue"
                            aria-describedby="reportedIssue"
                            placeholder="Enter Reported Issue"
                            autocomplete="off"
                        ></textarea>
                    </div>
                </div>
                <div class="grid-area: 4 / 4 / 5 / 6">
					    <div class="form-group">
                        <label for="Initials">Initials</label>
                        <input
                            type="text"
                            class="form-control"
                            id="Initials"
                            aria-describedby="initials"
                            placeholder="Enter Initials"
                            autocomplete="off"
                        />
                    </div>
				</div>
            </div>
