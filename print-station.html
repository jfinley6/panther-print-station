<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.8.0/flowbite.min.css" rel="stylesheet" />
    <title>Panther Print Station</title>
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.8.0/flowbite.min.js"></script>
    <div class="page-container">
      <!-- Navbar with logo -->
      <nav class="navbar-wrapper">
        <div class="navbar-content">
          <img class="navbar-img" src="./assets/pm-logo-panther.svg" />
          <p class="navbar-title">Print Station</p>
        </div>
        <ul class="navbar-list">
          <li id="active" class="navbar-list-item">
            <button id="serial-numbers-nav" onclick="return show_page(this.id,this.parentNode)" class="navbar-button">
              Serial Numbers
            </button>
          </li>
          <li class="navbar-list-item">
            <button id="toe-tags-nav" onclick="return show_page(this.id, this.parentNode)" class="navbar-button">
              Toe Tags
            </button>
          </li>
          <li class="navbar-list-item">
            <button id="crate-tags-nav" onclick="return show_page(this.id, this.parentNode)" class="navbar-button">
              Crates
            </button>
          </li>
        </ul>
      </nav>
      <!-- Serial Number Tag Component -->
      <div id="serial-numbers" class="main-component">
        <div id="serial-number-print-form">
          <p class="print-form-title">Enter Information Below</p>
          <div class="print-form-container">
            <form class="print-form">
              <div class="field-margin">
                <label class="label" for="panther-model-selection">
                  Panther Model
                </label>
                <select id="panther-model-selection" class="model-selection">
                  <option selected value="Predator_WAGO">
                    Predator (WAGO)
                  </option>
                  <option value="Predator_BEIJER">Predator (BEIJER)</option>
                  <option value="Predator_Swing">Predator Swing</option>
                  <option value="Phantom">Phantom</option>
                  <option value="FLEX">FLEX</option>
                  <option value="P5c">P5c</option>
                  <option value="Shadow">Shadow</option>
                  <option value="Servo_Stand">Servo Stand</option>
                </select>
              </div>
              <div class="field-margin">
                <label class="label">Options</label>
                <ul class="options-list">
                  <li class="options-list-item">
                    <div class="options-list-item-content">
                      <input id="autoheight-checkbox" type="checkbox" class="options-input" />
                      <label for="autoheight-checkbox" class="options-label">Auto Height Compensation</label>
                    </div>
                  </li>
                  <li class="options-list-item">
                    <div class="flex items-center pl-3">
                      <input id="expansion-checkbox" type="checkbox" class="options-input" />
                      <label for="expansion-checkbox" class="options-label">Expansion PLC</label>
                    </div>
                  </li>
                </ul>
              </div>

              <div class="form-buttons">
                <p class="print-button">Print</p>
                <p data-modal-target="popup-modal" data-modal-toggle="popup-modal"
                  class="preview-button"
                  >
                  Preview
                </p>
                
                <div id="popup-modal" tabindex="-1"
                  class="fixed top-0 left-0 right-0 z-50 hidden p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full">
                  <div class="relative w-full max-w-md max-h-full">
                    <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
                      <button type="button"
                        class="absolute top-3 right-2.5 text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ml-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
                        data-modal-hide="popup-modal">
                        <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
                        </svg>
                        <span class="sr-only">Close modal</span>
                      </button>
                      <div class="p-6 text-center">
                        <svg class="mx-auto mb-4 text-gray-400 w-12 h-12 dark:text-gray-200" aria-hidden="true"
                          xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 11V6m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                        <h3 class="mb-5 text-lg font-normal text-gray-500 dark:text-gray-400">Are you sure you want to delete this
                          product?</h3>
                        <button data-modal-hide="popup-modal" type="button"
                          class="text-white bg-red-600 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 dark:focus:ring-red-800 font-medium rounded-lg text-sm inline-flex items-center px-5 py-2.5 text-center mr-2">
                          Yes, I'm sure
                        </button>
                        <button data-modal-hide="popup-modal" type="button"
                          class="text-gray-500 bg-white hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 rounded-lg border border-gray-200 text-sm font-medium px-5 py-2.5 hover:text-gray-900 focus:z-10 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-500 dark:hover:text-white dark:hover:bg-gray-600 dark:focus:ring-gray-600">No,
                          cancel</button>
                      </div>
                    </div>
                  </div>
                </div>

              </div>
            </form>
          </div>
        </div>
        <div id="serial-number-firmwares">
          <p class="firmware-title">Firmwares</p>

      </div>

      <div id="toe-tags" class="main-component">Toe Tags</div>
